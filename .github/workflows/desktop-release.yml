name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  mac-arm64:
    name: Comote macOS arm64 DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee /tmp/test.out
      - name: Post failures as commit comment
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FAILS=$(awk '
            /^not ok/ {capture=1; print; next}
            capture && (/^# Subtest:/ || /^ok /) {capture=0}
            capture {print}
          ' /tmp/test.out)
          SUMMARY=$(grep -E "^# (tests|pass|fail|duration_ms)" /tmp/test.out | head -10)
          BODY="**CI test failure on \`${{ runner.os }}\`** ([run ${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}))

\`\`\`
$SUMMARY
\`\`\`

\`\`\`
$FAILS
\`\`\`"
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -f body="$BODY"
      - run: npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: Comote-arm64-dmg
          path: release/Comote-*-arm64.dmg
          if-no-files-found: error

  windows-x64:
    name: Comote Windows x64 installer
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee /tmp/test.out
      - name: Post failures as commit comment
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FAILS=$(awk '
            /^not ok/ {capture=1; print; next}
            capture && (/^# Subtest:/ || /^ok /) {capture=0}
            capture {print}
          ' /tmp/test.out)
          SUMMARY=$(grep -E "^# (tests|pass|fail|duration_ms)" /tmp/test.out | head -10)
          BODY="**CI test failure on \`${{ runner.os }}\`** ([run ${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}))

\`\`\`
$SUMMARY
\`\`\`

\`\`\`
$FAILS
\`\`\`"
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -f body="$BODY"
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: Comote-win-x64-setup
          path: release/Comote-Setup-*-x64.exe
          if-no-files-found: error
