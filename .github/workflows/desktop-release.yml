name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  mac-arm64:
    name: Comote macOS arm64 DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run dist:mac
      - uses: actions/upload-artifact@v6
        with:
          name: Comote-arm64-dmg
          path: release/Comote-*-arm64.dmg
          if-no-files-found: error

  windows-x64:
    name: Comote Windows x64 installer
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run dist:win
      - uses: actions/upload-artifact@v6
        with:
          name: Comote-win-x64-setup
          path: release/Comote-Setup-*-x64.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [mac-arm64, windows-x64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: Comote-arm64-dmg
          path: release-artifacts
      - uses: actions/download-artifact@v7
        with:
          name: Comote-win-x64-setup
          path: release-artifacts
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/*
          name: Comote ${{ github.ref_name }}
          body: |
            Comote ${{ github.ref_name }}

            Downloads:
            - **macOS (Apple Silicon)** — `Comote-*-arm64.dmg`
            - **Windows x64** — `Comote-Setup-*-x64.exe`

            See [README](https://github.com/GavinYangAI/comote#readme) for installation and setup.
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
