name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  mac-arm64:
    name: Comote macOS arm64 DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: Comote-arm64-dmg
          path: release/Comote-*-arm64.dmg
          if-no-files-found: error

  windows-x64:
    name: Comote Windows x64 installer
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: Comote-win-x64-setup
          path: release/Comote-Setup-*-x64.exe
          if-no-files-found: error
